<h1>Card Editor</h1>

@if (loading()) {
  <div>Loading...</div>
}

@if (card()) {

  <h2>{{ card().name }}</h2>
  @if (saving()) {
  <p>Guardando...</p>
}

  <div>

    <label>
      Nombre:
      <input
        type="text"
        [value]="card().name"
        (input)="updateField('name', $event)"
      />
    </label>

    <label>
      Descripción:
      <input
        type="text"
        [value]="card().description"
        (input)="updateField('description', $event)"
      />
    </label>

    <label>
      Color favorito:
      <input
        type="color"
        [value]="card().favoriteColor"
        (input)="updateField('favoriteColor', $event)"
      />
    </label>

    <label>
      Layout:
      <select
        [value]="card().layout"
        (change)="updateField('layout', $event)"
      >
        <option value="VERTICAL">VERTICAL</option>
        <option value="HORIZONTAL">HORIZONTAL</option>
        <option value="SQUARE">SQUARE</option>
      </select>
    </label>

    <label>
      Template:
      <select
        [value]="card().template"
        (change)="updateField('template', $event)"
      >
        <option value="DARK">DARK</option>
        <option value="LIGHT">LIGHT</option>
        <option value="NEON">NEON</option>
        <option value="MINIMAL">MINIMAL</option>
      </select>
    </label>

    <button (click)="save()">Guardar</button>

  </div>
}

<hr />

<h3>Agregar categoría</h3>

<select
  [value]="selectedCategoryType()"
(change)="onCategoryChange($event)">
  @for (type of favoriteTypes; track type) {
    <option [value]="type">{{ type }}</option>
  }
</select>

<button (click)="addCategory()">Agregar</button>

<hr />

@if (categories().length === 0) {
  <p>No hay categorías aún</p>
}

@for (category of categories(); track category.id) {

  <app-card-editor-category
    [category]="category"
    (remove)="removeCategory($event)"
  />

}

<hr />

<h2>Preview</h2>

@if (card()) {
  <app-card-preview
    [card]="card()"
    [categories]="categories()"
  />
}
