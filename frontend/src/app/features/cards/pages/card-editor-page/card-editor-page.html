<h1>Card Editor</h1>

@if (loading()) {
  <div>Loading...</div>
}

@if (card()) {

  <h2>{{ card().name }}</h2>

  <!-- 🔥 FORMULARIO COMPLETO -->
  <div>

    <label>
      Nombre:
      <input
        type="text"
        [value]="card().name"
        (input)="updateField('name', $event)"
      />
    </label>

    <label>
      Descripción:
      <input
        type="text"
        [value]="card().description"
        (input)="updateField('description', $event)"
      />
    </label>

    <label>
      Edad:
      <input
        type="number"
        [value]="card().age"
        (input)="updateField('age', $event)"
      />
    </label>

    <label>
      Color favorito:
      <input
        type="color"
        [value]="card().favoriteColor"
        (input)="updateField('favoriteColor', $event)"
      />
    </label>

    <label>
      Layout:
      <select
        [value]="card().layout"
        (change)="updateField('layout', $event)"
      >
        <option value="grid">Grid</option>
        <option value="list">List</option>
      </select>
    </label>

    <label>
      Template:
      <select
        [value]="card().template"
        (change)="updateField('template', $event)"
      >
        <option value="default">Default</option>
        <option value="modern">Modern</option>
      </select>
    </label>

    <button (click)="save()">Guardar</button>

  </div>
}

<hr />

<h3>Agregar categoría</h3>

<select
  [value]="selectedCategoryToAdd()"
  (change)="selectedCategoryToAdd.set($any($event.target).value)"
>
  @for (type of favoriteTypes; track $index) {
    <option [value]="type">{{ type }}</option>
  }
</select>

<button (click)="addCategory()">Agregar</button>

<hr />

@for (type of activeCategories(); track type) {
  <app-card-editor-favorites
    [type]="type"
    [cardId]="id!"
    (remove)="removeCategory(type)"
  />
}
